<!doctype html>

<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <title>{% block title %}{% endblock %}F1 Standings Explorer</title>
</head>

<body>
    <nav class="py-6 px-6 flex justify-between items-center border-b border-stone-900 bg-red-600">
        <a href="/" class="text-xl font-semibold text-slate-50">F1 Standings Explorer</a>
    </nav>

    <div class="px-6 py-6">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="py-6 px-6 flex justify-between bg-gray-800">
        <div class="w-2/3 pr-10">
            <h3 class="mb-5 font-semibold text-gray-400">Disclaimer</h3>

            <p class="text-lg text-gray-500">All rights to Formula 1, F2, F3, FIA, etc. etc..</p>
        </div>
        <div class="w-1/3">
            <ul class="space-y-2">
                <li><a href="#" class="text-lg text-red-600 hover:text-red-800">About</a></li>
                <li><a href="#" class="text-lg text-red-600 hover:text-red-800">Contact</a>
                </li>
                <li><a href="#" class="text-lg text-red-600 hover:text-red-800">Privacy</a></li>
                <li><a href="#" class="text-lg text-red-600 hover:text-red-800">Terms of Use</a></li>
            </ul>
        </div>
    </footer>
</body>



</html>
