<!doctype html>

<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <title>{% block title %}{% endblock %}F1 Standings Explorer</title>
</head>

<body>

    <nav class="py-6 px-6 flex border-b justify-start border-black bg-black">
        <div class="">
            {% load static %}
            <img class="h-20 w-54" src="{% static 'core/f1_logo3.png' %}" alt="F1 Logo" />
        </div>
        <div class="flex items-center">
            <h1 class="mx-8 text-7xl font-semibold text-red-700">F1 Standings Explorer</h1>
        </div>
    </nav>

    <div class="px-6 py-6">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="py-6 px-6 flex justify-between bg-black">
        <div class="w-2/3 pr-10">
            <h3 class="mb-5 font-semibold text-gray-400">Disclaimer</h3>

            <p class="text-lg text-gray-500">All rights to Formula 1, FIA, and whoever owns things. I do not claim
                any F1 or related IP as my own.</p>
        </div>
        <div class="w-1/3">
            <ul class="space-y-2">
                <li><a href="#" class="text-lg text-red-600 hover:text-red-800">About</a></li>
                <li><a href="#" class="text-lg text-red-600 hover:text-red-800">Contact</a>
                </li>
                <li><a href="#" class="text-lg text-red-600 hover:text-red-800">Add Grand Prix</a></li>
                <li><a href="{% url 'core:add_race_results' %}" class="text-lg text-red-600 hover:text-red-800">Add Race
                        Results</a></li>
            </ul>
        </div>
    </footer>
</body>



</html>
